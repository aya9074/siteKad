{% extends "base.html" %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<article class="page-content">
    <h1>{{ page.title }}</h1>
    
    <div class="page-text">
        {{ page.content|safe }}
    </div>
    
    {% if page.has_photo and page.photo_path %}
    <div class="page-photo">
        <img src="{{ url_for('static', filename=page.photo_path) }}" alt="{{ page.title }}">
    </div>
    {% endif %}
    
    {% if page.has_map and page.map_coords %}
    <div class="page-map">
        <iframe
            src="https://yandex.ru/map-widget/v1/?ll={{ page.map_coords }}&z={{ page.map_zoom }}"
            width="100%"
            height="400"
            frameborder="0"
            allowfullscreen="true"
        ></iframe>
    </div>
    {% endif %}
</article>
{% endblock %}
